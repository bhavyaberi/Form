<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Form</title>
    <link rel="stylesheet" href="Form_CSS.css">
   
</head>
<body>
    <h2 style="text-align: center; font-family: cursive; font-size: 30px;">Login Form</h2>
    
    <form id="myform" onsubmit="return validateForm()">
        
        <label >Full Name:</label>
        <input text id="name" placeholder="Enter your name">
        <div class="error" id="nameError"></div><br>

        <label >Date of Birth:</label>
        <input type="date" id="dob">
        <div class="error" id="dobError"></div>
        <br>

        <label >Gender:</label>
        <input type="radio" id="male" name="gender" style="width: 5%;" checked> Male 
        <input type="radio" id="female" name="gender" style="width: 5%"> Female
        <input type="radio" id="female" name="gender" style="width: 5%"> Prefer not to say
        <br><br>

        <label >Email Address:</label>
        <input type="text" id="email" placeholder="abc@example.com">
        <div class="error" id="emailError"></div><br>

        <label >Phone Number:</label>
        <input type="text" id="phone" placeholder="XXXXXXX123">
        <div class="error" id="phoneError"></div><br>
      
        <label >City:</label>
        <select name="city" id="city" style="padding: 5px;" onchange="othercity()">
            <option value="">Select</option>
            <option value="phg">Phagwara</option>
            <option value="jal">Jalandhar</option>
            <option value="chd">Chandigarh</option>
            <option value="ldh">Ludhiana</option>
            <option value="amr">Amritsar</option>
            <option value="Other">Other</option>
        </select>
        <input type="text" id="otherCity" placeholder="Enter your city" style="display:none;">
        <div class="error" id="cityError"></div>
        <br><br>

        <label >Address:</label>
        <input type="text" id="address" placeholder="Enter your address">
        <div class="error" id="addressError"></div><br>

         <label >Password:</label>
        <input type="password" id="password" placeholder="Password">
        <div class="error" id="passError"></div><br>

        <label >Confirm Password:</label>
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <div class="error" id="confirmPassError"></div><br>

        <button type="submit" id="submit" onclick="showMessage()">Submit</button>
   
    </form>
     <script src="Form_script.js"></script>
</body>
</html>
